<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventStream Example</title>
    <script>
        let eventSource = null; // 用于存储 EventSource 实例
        let messageQueue = []; // 消息队列
        let isTyping = false; // 当前是否有消息正在输出
        let scrollTimeout = null; // 用于节流的定时器

        // 节流的 scrollToBottom 函数
        function scrollToBottom() {
            if (scrollTimeout) return;
            scrollTimeout = setTimeout(() => {
                const messageBox = document.getElementById("message-box");
                messageBox.scrollTop = messageBox.scrollHeight;
                scrollTimeout = null;
            }, 100);
        }

        // 打字机效果函数
        function typeText(container, text, delay = 50) {
            return new Promise((resolve) => {
                let index = 0;

                function type() {
                    if (index < text.length) {
                        container.textContent += text[index];
                        index++;
                        scrollToBottom();
                        setTimeout(type, delay);
                    } else {
                        resolve();
                    }
                }

                type();
            });
        }

        async function processQueue() {
            if (isTyping || messageQueue.length === 0) return;

            isTyping = true;
            const { container, text } = messageQueue.shift();
            await typeText(container, text);
            isTyping = false;
            await processQueue();
        }

        function startEventStream() {
            if (eventSource) {
                processMessage("已经连接到事件流，请勿重复点击！");
                return;
            }

            eventSource = new EventSource('/eventStream');

            eventSource.onmessage = (event) => {
                // 移除 "data: " 前缀并解析 JSON
                const rawData = event.data.trim();
                if (rawData.startsWith("data: ")) {
                    const jsonStr = rawData.substring(6); // 去掉 "data: " 前缀
                    try {
                        const data = JSON.parse(jsonStr);

                        // 处理结束信号
                        if (data.object === "stream.end") {
                            processMessage("服务器已发送所有消息，流结束。");
                            stopEventStream();
                            return;
                        }

                        // 提取 OpenAI 格式中的实际文本内容
                        const textContent = data.choices && data.choices[0] ? data.choices[0].text : "无内容";
                        processMessage(textContent);
                    } catch (e) {
                        processMessage(`解析错误: ${event.data}`);
                    }
                } else {
                    processMessage(`收到未格式化消息: ${event.data}`);
                }
            };

            eventSource.onopen = () => {
                processMessage("连接已建立，开始接收数据...");
            };

            eventSource.onerror = () => {
                processMessage("发生错误或连接已关闭！");
                stopEventStream();
            };
        }

        function stopEventStream() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
                processMessage("事件流已停止。");
            }
        }

        function processMessage(message) {
            const messageBox = document.getElementById("message-box");
            const messageElement = document.createElement("div");
            messageBox.appendChild(messageElement);
            messageQueue.push({ container: messageElement, text: message });
            processQueue();
        }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        #message-box {
            width: 95%;
            height: 300px;
            border: 1px solid #ccc;
            padding: 10px;
            overflow-y: auto;
            background-color: #f9f9f9;
            margin-top: 10px;
        }

        .button-container {
            margin-top: 10px;
        }

        button {
            padding: 10px 15px;
            font-size: 14px;
            margin-right: 10px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
<h1>EventStream 示例</h1>
<p>点击“开始”按钮连接到后端事件流接口，并查看接收到的消息：</p>
<div class="button-container">
    <button onclick="startEventStream()">开始接收</button>
    <button onclick="stopEventStream()">停止接收</button>
</div>
<div id="message-box"></div>
</body>
</html>
